<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHTML Manager</title>
    <!-- Thư viện Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Hỗ trợ tab trong trình soạn thảo */
        .tab-size-2 { -moz-tab-size: 2; -o-tab-size: 2; tab-size: 2; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden">

    <div id="app" class="flex h-screen w-full">
        
        <!-- SIDEBAR -->
        <div id="sidebar" class="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col transition-all z-20">
            <div class="p-4 border-b border-slate-200 bg-white">
                <div class="flex items-center gap-2 text-indigo-600 mb-4">
                    <i class="fa-solid fa-layer-group text-xl"></i>
                    <h1 class="font-bold text-lg">SmartHTML Hub</h1>
                </div>
                <!-- Thêm thông báo trạng thái Đồng bộ Đám mây -->
                <div id="cloud-status" class="text-xs font-medium text-slate-500 flex justify-center mb-3 items-center gap-1 bg-slate-50 py-1 rounded-md border border-slate-100">
                    <i class="fa-solid fa-rotate animate-spin text-indigo-400"></i> Đang kết nối mây...
                </div>
                <button id="btn-create-new" class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded-lg transition-colors font-medium shadow-sm mb-3">
                    <i class="fa-solid fa-plus text-sm"></i> Tạo file mới
                </button>
                <div class="flex gap-2">
                    <button id="btn-export" class="flex-1 text-xs py-1.5 font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-md transition-colors tooltip" title="Sao lưu toàn bộ danh sách">
                        <i class="fa-solid fa-file-export"></i> Xuất D.liệu
                    </button>
                    <label class="flex-1 text-center text-xs py-1.5 font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-md cursor-pointer transition-colors tooltip" title="Khôi phục danh sách từ file">
                        <i class="fa-solid fa-file-import"></i> Nhập D.liệu
                        <input type="file" id="input-import" accept=".json" class="hidden">
                    </label>
                </div>
            </div>

            <div class="p-4 border-b border-slate-200 bg-slate-50/50">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="search-input" placeholder="Tìm kiếm thông minh..." class="w-full pl-9 pr-3 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
                </div>
            </div>

            <div id="file-list-container" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Danh sách file sẽ được render tại đây -->
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div id="main-content" class="flex-1 flex flex-col bg-slate-50/50 hidden md:flex w-full">
            
            <!-- VIEW: Chưa chọn file -->
            <div id="view-empty" class="flex-1 flex flex-col items-center justify-center text-slate-400 p-8 hidden">
                <i class="fa-regular fa-folder-open text-6xl mb-4 text-indigo-200"></i>
                <h2 class="text-xl font-medium text-slate-600 mb-2">Chưa có file nào được chọn</h2>
                <p class="text-center max-w-sm mb-6">Chọn một file từ danh sách bên trái hoặc tạo file HTML mới để bắt đầu lưu trữ.</p>
                <button id="btn-empty-create" class="flex items-center gap-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 py-2 px-4 rounded-lg transition-colors font-medium shadow-sm">
                    <i class="fa-solid fa-plus text-sm"></i> Tạo file đầu tiên
                </button>
            </div>

            <!-- VIEW: Chỉnh sửa / Tạo mới -->
            <div id="view-edit" class="flex-1 flex flex-col h-full hidden">
                <div class="p-4 border-b border-slate-200 bg-white flex items-center justify-between z-10 shadow-sm">
                    <div class="flex items-center gap-3">
                        <button id="btn-edit-back" class="p-1.5 text-slate-500 hover:bg-slate-100 rounded-md md:hidden">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <h2 id="edit-header-title" class="font-semibold text-lg">Tạo File Mới</h2>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="btn-cancel-edit" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Hủy</button>
                        <button id="btn-save-file" class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors shadow-sm">
                            <i class="fa-regular fa-floppy-disk"></i> Lưu lại
                        </button>
                    </div>
                </div>
                
                <div class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
                    <div class="max-w-4xl mx-auto space-y-6 flex flex-col h-full">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tiêu đề file</label>
                            <input type="text" id="edit-title" placeholder="VD: Mẫu Landing Page Sự kiện" class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium" />
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Thẻ phân loại thông minh (Tự động nhận diện)</label>
                            <div class="relative">
                                <i class="fa-solid fa-tags absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                <input type="text" id="edit-tags" placeholder="VD: css, button, component" class="w-full pl-9 pr-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                            </div>
                        </div>

                        <div class="flex-1 flex flex-col lg:flex-row min-h-[400px] gap-4">
                            <!-- Cột Code -->
                            <div class="flex-1 flex flex-col">
                                <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                                    <i class="fa-solid fa-code"></i> Mã nguồn HTML/CSS/JS
                                </label>
                                <textarea id="edit-content" spellcheck="false" placeholder="<!-- Nhập HTML, CSS hoặc JS của bạn vào đây -->" class="w-full flex-1 p-4 bg-[#1e1e1e] text-[#d4d4d4] font-mono text-sm rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-slate-300 resize-none tab-size-2"></textarea>
                            </div>
                            
                            <!-- Cột Live Preview (Chia đôi màn hình) -->
                            <div class="flex-1 flex flex-col hidden lg:flex">
                                <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                                    <i class="fa-solid fa-bolt text-amber-500"></i> Xem trước trực tiếp
                                </label>
                                <div class="flex-1 bg-white border border-slate-300 rounded-lg overflow-hidden relative shadow-inner">
                                    <iframe id="live-preview-frame" class="w-full h-full border-0 absolute inset-0 bg-white" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- VIEW: Chi tiết -->
            <div id="view-detail" class="flex-1 flex flex-col h-full overflow-hidden hidden">
                <div class="p-4 border-b border-slate-200 bg-white flex items-center justify-between shadow-sm z-10">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <button id="btn-detail-back" class="p-1.5 text-slate-500 hover:bg-slate-100 rounded-md md:hidden shrink-0">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <div class="min-w-0">
                            <h2 id="detail-title" class="font-semibold text-lg text-slate-800 truncate">Tên File</h2>
                            <div id="detail-date" class="text-xs text-slate-400 mt-0.5 truncate">Cập nhật lần cuối: ...</div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-1 shrink-0 ml-2 md:gap-2">
                        <button id="btn-duplicate" class="p-2 text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 rounded-md transition-colors tooltip" title="Nhân bản file (Duplicate)">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                        <button id="btn-download" class="p-2 text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 rounded-md transition-colors tooltip" title="Tải xuống máy tính">
                            <i class="fa-solid fa-download"></i>
                        </button>
                        <div class="w-px h-6 bg-slate-200 mx-1"></div>
                        <button id="btn-edit-mode" class="p-2 text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 rounded-md transition-colors" title="Chỉnh sửa">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button id="btn-delete" class="p-2 text-slate-600 hover:bg-red-50 hover:text-red-600 rounded-md transition-colors" title="Xoá">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                </div>

                <!-- Tabs: Xem trước / Mã nguồn -->
                <div class="bg-slate-100 p-2 border-b border-slate-200 flex justify-center gap-1 relative z-10">
                    <button id="tab-preview" class="flex items-center gap-2 px-4 py-1.5 rounded-md text-sm font-medium transition-colors bg-white text-indigo-600 shadow-sm">
                        <i class="fa-regular fa-eye"></i> Xem trước
                    </button>
                    <button id="tab-code" class="flex items-center gap-2 px-4 py-1.5 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-slate-200">
                        <i class="fa-solid fa-code"></i> Xem Code
                    </button>
                    
                    <!-- Nút Mở tab mới -->
                    <button id="btn-fullscreen" class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-colors text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 hidden" title="Mở trong tab mới để xem đầy đủ">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                        <span class="hidden sm:inline">Toàn màn hình</span>
                    </button>
                </div>

                <div class="flex-1 overflow-hidden relative bg-white">
                    <!-- Đã thêm các sandbox permissons -->
                    <iframe id="preview-frame" class="w-full h-full border-0 bg-white block" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
                    
                    <div id="code-viewer" class="hidden w-full h-full p-4 overflow-auto bg-[#1e1e1e]">
                        <pre><code id="code-display" class="text-[#d4d4d4] font-mono text-sm leading-relaxed whitespace-pre-wrap"></code></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Nâng cấp script thành module và tích hợp Firebase Cloud Storage -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const defaultFiles = [
            {
                id: '1',
                title: 'Trang đích cơ bản',
                tags: ['landing', 'template', 'basic'],
                content: '<!DOCTYPE html>\n<html lang="vi">\n<head>\n  <meta charset="UTF-8">\n  <title>Trang đích</title>\n  <style>\n    body { font-family: sans-serif; text-align: center; padding: 50px; }\n    h1 { color: #2563eb; }\n  </style>\n</head>\n<body>\n  <h1>Chào mừng đến với trang của tôi!</h1>\n  <p>Đây là một mẫu HTML đơn giản.</p>\n</body>\n</html>',
                updatedAt: new Date().toISOString()
            },
            {
                id: '2',
                title: 'Nút bấm hiệu ứng (Button CSS)',
                tags: ['css', 'button', 'ui'],
                content: '<style>\n  .btn {\n    background: #10b981;\n    color: white;\n    padding: 10px 20px;\n    border: none;\n    border-radius: 5px;\n    cursor: pointer;\n    transition: transform 0.2s;\n  }\n  .btn:hover {\n    transform: scale(1.05);\n  }\n</style>\n<button class="btn">Click me!</button>',
                updatedAt: new Date().toISOString()
            }
        ];

        let state = {
            files: [],
            searchQuery: '',
            selectedId: null,
            isEditing: false,
            viewMode: 'preview' // 'preview' or 'code'
        };

        // Firebase Vars
        let db, auth, currentUser, appId;

        const els = {
            sidebar: document.getElementById('sidebar'),
            mainContent: document.getElementById('main-content'),
            fileListContainer: document.getElementById('file-list-container'),
            searchInput: document.getElementById('search-input'),
            
            viewEmpty: document.getElementById('view-empty'),
            viewEdit: document.getElementById('view-edit'),
            viewDetail: document.getElementById('view-detail'),
            
            editHeaderTitle: document.getElementById('edit-header-title'),
            editTitle: document.getElementById('edit-title'),
            editTags: document.getElementById('edit-tags'),
            editContent: document.getElementById('edit-content'),
            livePreviewFrame: document.getElementById('live-preview-frame'),
            
            detailTitle: document.getElementById('detail-title'),
            detailDate: document.getElementById('detail-date'),
            previewFrame: document.getElementById('preview-frame'),
            codeViewer: document.getElementById('code-viewer'),
            codeDisplay: document.getElementById('code-display'),
            
            tabPreview: document.getElementById('tab-preview'),
            tabCode: document.getElementById('tab-code'),
            btnFullscreen: document.getElementById('btn-fullscreen'),
            cloudStatus: document.getElementById('cloud-status')
        };

        async function initApp() {
            attachEventListeners();
            
            // Khởi tạo Cloud Database
            try {
                if (typeof __firebase_config !== 'undefined') {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'smarthtml-default-app';
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    // Xác thực an toàn
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        if (user) setupCloudSync();
                    });
                } else {
                    fallbackToLocal();
                }
            } catch (error) {
                console.error("Lỗi khởi tạo Cloud, quay về Local:", error);
                fallbackToLocal();
            }
        }

        function setupCloudSync() {
            const filesRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'html_files');
            
            // Lắng nghe thay đổi dữ liệu thời gian thực
            onSnapshot(filesRef, (snapshot) => {
                const loadedFiles = [];
                snapshot.forEach(doc => loadedFiles.push({id: doc.id, ...doc.data()}));
                
                // Sắp xếp file mới nhất lên đầu
                loadedFiles.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
                
                if (loadedFiles.length === 0 && state.files.length === 0) {
                    // Nếu mây trống, đẩy file mặc định lên
                    defaultFiles.forEach(f => syncToCloud(f));
                } else {
                    state.files = loadedFiles;
                    updateCloudStatus('<i class="fa-solid fa-cloud-check text-green-500"></i> Đã đồng bộ', 'bg-green-50');
                    renderApp();
                }
            }, (error) => {
                console.error("Lỗi đồng bộ:", error);
                updateCloudStatus('<i class="fa-solid fa-cloud-xmark text-red-500"></i> Lỗi đồng bộ', 'bg-red-50');
            });
        }

        async function syncToCloud(fileObj) {
            if (!currentUser) return saveToLocalStorage();
            try {
                updateCloudStatus('<i class="fa-solid fa-cloud-arrow-up text-blue-500 animate-pulse"></i> Đang lưu mây...', 'bg-blue-50');
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'html_files', fileObj.id);
                await setDoc(docRef, fileObj);
            } catch (e) {
                console.error("Không thể lưu lên mây:", e);
                updateCloudStatus('<i class="fa-solid fa-cloud-xmark text-red-500"></i> Lỗi lưu trữ', 'bg-red-50');
            }
        }

        async function deleteFromCloud(fileId) {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'html_files', fileId);
                await deleteDoc(docRef);
            } catch (e) {
                console.error(e);
            }
        }

        function updateCloudStatus(html, bgClass) {
            els.cloudStatus.innerHTML = html;
            els.cloudStatus.className = `text-xs font-medium text-slate-600 flex justify-center mb-3 items-center gap-1 py-1.5 rounded-md border border-slate-100 transition-colors ${bgClass}`;
        }

        function fallbackToLocal() {
            updateCloudStatus('<i class="fa-solid fa-hard-drive text-slate-500"></i> Chế độ Offline', 'bg-slate-100');
            const stored = localStorage.getItem('smartHtmlFilesV3');
            if (stored) {
                try { state.files = JSON.parse(stored); } catch(e) { state.files = defaultFiles; }
            } else {
                state.files = [...defaultFiles];
                saveToLocalStorage();
            }
            renderApp();
        }

        function saveToLocalStorage() {
            if(currentUser) return; // Không lưu local nếu đang dùng mây
            localStorage.setItem('smartHtmlFilesV3', JSON.stringify(state.files));
        }

        // --- CÁC HÀM RENDER ---

        function renderApp() {
            renderFileList();
            renderMainArea();
            updateMobileVisibility();
        }

        function renderFileList() {
            const query = state.searchQuery.toLowerCase().trim();
            const filtered = state.files.filter(f => {
                if(!query) return true;
                return f.title.toLowerCase().includes(query) || 
                       f.tags.some(t => t.toLowerCase().includes(query)) ||
                       f.content.toLowerCase().includes(query);
            });

            if (filtered.length === 0) {
                els.fileListContainer.innerHTML = `
                    <div class="p-8 text-center text-slate-400 mt-4">
                        <i class="fa-regular fa-file-code text-4xl mb-3 opacity-30"></i>
                        <p class="text-sm">Không tìm thấy file nào.</p>
                    </div>`;
                return;
            }

            els.fileListContainer.innerHTML = filtered.map(file => {
                const isSelected = state.selectedId === file.id && !state.isEditing;
                const activeClass = isSelected ? 'bg-indigo-50 border-indigo-200' : 'border-transparent hover:bg-slate-100';
                const titleClass = isSelected ? 'text-indigo-900' : 'text-slate-700';
                
                const tagsHtml = file.tags.length > 0 
                    ? `<div class="flex flex-wrap gap-1 mt-2">
                        ${file.tags.map(tag => `<span class="text-[10px] px-1.5 py-0.5 rounded-md bg-white border border-slate-200 text-slate-500 font-medium">#${escapeHtml(tag)}</span>`).join('')}
                       </div>` 
                    : '';

                return `
                    <div class="file-item p-3 rounded-lg cursor-pointer transition-all border ${activeClass}" data-id="${file.id}">
                        <h3 class="font-medium truncate ${titleClass}">${escapeHtml(file.title)}</h3>
                        ${tagsHtml}
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.file-item').forEach(item => {
                item.addEventListener('click', () => handleSelectFile(item.dataset.id));
            });
        }

        function renderMainArea() {
            els.viewEmpty.classList.add('hidden');
            els.viewEdit.classList.add('hidden');
            els.viewDetail.classList.add('hidden');

            if (state.isEditing) {
                els.viewEdit.classList.remove('hidden');
                els.editHeaderTitle.textContent = state.selectedId ? 'Sửa File' : 'Tạo File Mới';
                
                if (state.selectedId && els.editTitle.dataset.loadedId !== state.selectedId) {
                    const file = state.files.find(f => f.id === state.selectedId);
                    els.editTitle.value = file.title;
                    els.editTags.value = file.tags.join(', ');
                    els.editContent.value = file.content;
                    els.editTitle.dataset.loadedId = state.selectedId;
                    updateLivePreview();
                } else if (!state.selectedId && els.editTitle.dataset.loadedId !== 'new') {
                    els.editTitle.value = 'File HTML mới';
                    els.editTags.value = '';
                    els.editContent.value = '<!-- Viết mã HTML của bạn vào đây -->';
                    els.editTitle.dataset.loadedId = 'new';
                    updateLivePreview();
                }
            } 
            else if (state.selectedId) {
                els.viewDetail.classList.remove('hidden');
                const file = state.files.find(f => f.id === state.selectedId);
                if(!file) return;

                els.detailTitle.textContent = file.title;
                els.detailDate.textContent = 'Cập nhật lần cuối: ' + new Date(file.updatedAt).toLocaleString('vi-VN');
                
                if (state.viewMode === 'preview') {
                    els.previewFrame.classList.remove('hidden');
                    els.codeViewer.classList.add('hidden');
                    els.previewFrame.srcdoc = file.content;
                    
                    els.tabPreview.className = "flex items-center gap-2 px-4 py-1.5 rounded-md text-sm font-medium transition-colors bg-white text-indigo-600 shadow-sm";
                    els.tabCode.className = "flex items-center gap-2 px-4 py-1.5 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-slate-200";
                    els.btnFullscreen.classList.remove('hidden');
                    els.btnFullscreen.classList.add('flex');
                } else {
                    els.previewFrame.classList.add('hidden');
                    els.codeViewer.classList.remove('hidden');
                    els.codeDisplay.textContent = file.content;
                    
                    els.tabCode.className = "flex items-center gap-2 px-4 py-1.5 rounded-md text-sm font-medium transition-colors bg-white text-indigo-600 shadow-sm";
                    els.tabPreview.className = "flex items-center gap-2 px-4 py-1.5 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-slate-200";
                    els.btnFullscreen.classList.add('hidden');
                    els.btnFullscreen.classList.remove('flex');
                }
            } 
            else {
                els.viewEmpty.classList.remove('hidden');
            }
        }

        function updateMobileVisibility() {
            const hasActiveView = state.selectedId || state.isEditing;
            if (hasActiveView) {
                els.sidebar.classList.add('hidden', 'md:flex');
                els.mainContent.classList.remove('hidden');
            } else {
                els.sidebar.classList.remove('hidden', 'md:flex');
                els.mainContent.classList.add('hidden', 'md:flex');
            }
        }

        // --- CÁC HÀM XỬ LÝ SỰ KIỆN ---

        function handleSearch(e) {
            state.searchQuery = e.target.value;
            renderFileList();
        }

        function handleSelectFile(id) {
            state.selectedId = id;
            state.isEditing = false;
            state.viewMode = 'preview';
            delete els.editTitle.dataset.loadedId; 
            renderApp();
        }

        function handleCreateNew() {
            state.selectedId = null;
            state.isEditing = true;
            delete els.editTitle.dataset.loadedId;
            renderApp();
        }

        function handleEditMode() {
            state.isEditing = true;
            delete els.editTitle.dataset.loadedId;
            renderApp();
        }

        function handleCancelEdit() {
            state.isEditing = false;
            if(!state.selectedId && state.files.length === 0) state.selectedId = null;
            renderApp();
        }

        function handleBackToList() {
            state.selectedId = null;
            state.isEditing = false;
            renderApp();
        }

        function handleSaveFile() {
            const title = els.editTitle.value.trim();
            if (!title) {
                alert("Vui lòng nhập tiêu đề!");
                els.editTitle.focus();
                return;
            }

            const tagsStr = els.editTags.value;
            const content = els.editContent.value;
            const tags = tagsStr.split(',').map(t => t.trim().toLowerCase()).filter(t => t);
            const now = new Date().toISOString();

            let targetFile;
            if (state.selectedId) {
                targetFile = { ...state.files.find(f => f.id === state.selectedId), title, tags, content, updatedAt: now };
                // Nếu dùng local, cập nhật mảng. Nếu cloud, hàm sync sẽ lo liệu.
                if(!currentUser) {
                    const idx = state.files.findIndex(f => f.id === state.selectedId);
                    if(idx !== -1) state.files[idx] = targetFile;
                }
            } else {
                targetFile = { id: Date.now().toString(), title, tags, content, updatedAt: now };
                state.selectedId = targetFile.id;
                if(!currentUser) state.files.unshift(targetFile);
            }

            state.isEditing = false;
            
            // Gọi hàm đồng bộ thay vì lưu local
            syncToCloud(targetFile);
            
            if(!currentUser) renderApp(); 
            // Nếu có cloud, onSnapshot sẽ tự động gọi renderApp khi dữ liệu thay đổi
        }

        function handleDeleteFile() {
            if (confirm("Bạn có chắc chắn muốn xoá file này?")) {
                const idToDelete = state.selectedId;
                state.selectedId = null;
                
                if (currentUser) {
                    deleteFromCloud(idToDelete);
                } else {
                    state.files = state.files.filter(f => f.id !== idToDelete);
                    saveToLocalStorage();
                    renderApp();
                }
            }
        }

        function handleDownload() {
            const file = state.files.find(f => f.id === state.selectedId);
            if(!file) return;

            const blob = new Blob([file.content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            let safeName = file.title.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            a.download = `${safeName || 'html_file'}.html`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function handleOpenInNewTab() {
            const file = state.files.find(f => f.id === state.selectedId);
            if(!file) return;

            const blob = new Blob([file.content], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }
        
        function updateLivePreview() {
            if (state.isEditing && els.livePreviewFrame) {
                els.livePreviewFrame.srcdoc = els.editContent.value;
            }
        }

        // Hàm loại bỏ dấu tiếng Việt
        function removeVietnameseTones(str) {
            return str.normalize('NFD')
                      .replace(/[\u0300-\u036f]/g, '')
                      .replace(/đ/g, 'd').replace(/Đ/g, 'D');
        }

        // Xử lý khi nhập content: Cập nhật Live Preview và trích xuất tag từ <title>
        function handleContentInput(e) {
            updateLivePreview();
            
            const content = els.editContent.value;
            
            // Lấy danh sách tag hiện tại để không bị trùng lặp
            let currentTags = els.editTags.value.split(',').map(t => t.trim().toLowerCase()).filter(t => t);
            const tagSet = new Set(currentTags);
            let tagsUpdated = false;

            // Tự động bắt thẻ <title> và chia nhỏ tạo tag
            const titleMatch = content.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
            if (titleMatch && titleMatch[1]) {
                const rawTitle = titleMatch[1].trim();
                
                // Cập nhật tiêu đề file (bỏ dấu tiếng Việt)
                const extractedTitle = removeVietnameseTones(rawTitle);
                els.editTitle.value = extractedTitle;

                // Chia nhỏ title thành các tag dựa trên các dấu câu phân cách phổ biến
                const titleParts = rawTitle.split(/[-.,|();:\[\]_]+/);
                titleParts.forEach(part => {
                    // Cắt khoảng trắng, bỏ dấu tiếng Việt và chuyển thành chữ thường cho Tag
                    const cleanTag = removeVietnameseTones(part.trim()).toLowerCase();
                    if (cleanTag && cleanTag.length > 0 && !tagSet.has(cleanTag)) {
                        tagSet.add(cleanTag);
                        tagsUpdated = true;
                    }
                });
            }

            // Tự động điền lại vào ô input nếu có tag mới
            if (tagsUpdated) {
                els.editTags.value = Array.from(tagSet).join(', ');
            }
        }

        function handleEditorTab(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 2;
                updateLivePreview();
            }
        }

        function handleDuplicate() {
            const fileToCopy = state.files.find(f => f.id === state.selectedId);
            if(!fileToCopy) return;
            
            const newFile = {
                ...fileToCopy,
                id: Date.now().toString(),
                title: fileToCopy.title + ' (Bản sao)',
                updatedAt: new Date().toISOString()
            };
            
            state.selectedId = newFile.id;
            syncToCloud(newFile);
            
            if(!currentUser) {
                state.files.unshift(newFile);
                renderApp();
            }
        }

        function handleExport() {
            if(state.files.length === 0) {
                alert("Không có dữ liệu để xuất!"); return;
            }
            const blob = new Blob([JSON.stringify(state.files, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `smarthtml_workspace_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async function(event) {
                try {
                    const importedFiles = JSON.parse(event.target.result);
                    if (Array.isArray(importedFiles)) {
                        const isOverwrite = confirm(`Tìm thấy ${importedFiles.length} file. Bạn muốn XÓA DỮ LIỆU CŨ và thay thế toàn bộ không?\n\n(Chọn [Cancel] để GỘP chung các file này vào danh sách hiện tại)`);
                        
                        state.selectedId = null;
                        state.isEditing = false;

                        if (currentUser) {
                            updateCloudStatus('<i class="fa-solid fa-cloud-arrow-up animate-pulse"></i> Đang tải dữ liệu lên...', 'bg-blue-50');
                            if (isOverwrite) {
                                // Nếu chọn ghi đè, xóa hết file cũ trước (trên mây)
                                for (let f of state.files) await deleteFromCloud(f.id);
                            }
                            // Đẩy từng file lên mây
                            for (let f of importedFiles) {
                                const newF = isOverwrite ? f : {...f, id: Date.now().toString() + Math.random().toString(36).substr(2, 5)};
                                await syncToCloud(newF);
                            }
                            alert("Đã đẩy dữ liệu lên Đám mây thành công!");
                        } else {
                            if (isOverwrite) {
                                state.files = importedFiles;
                            } else {
                                const merged = importedFiles.map(f => ({
                                    ...f, id: Date.now().toString() + Math.random().toString(36).substr(2, 5)
                                }));
                                state.files = [...merged, ...state.files];
                            }
                            saveToLocalStorage();
                            renderApp();
                            alert("Nhập dữ liệu Workspace thành công!");
                        }
                    } else {
                        alert("Định dạng file không được hỗ trợ!");
                    }
                } catch(error) {
                    alert("File bị lỗi hoặc không phải là file JSON hợp lệ!");
                }
                e.target.value = '';
            };
            reader.readAsText(file);
        }

        function attachEventListeners() {
            document.getElementById('btn-create-new').addEventListener('click', handleCreateNew);
            els.searchInput.addEventListener('input', handleSearch);
            
            document.getElementById('btn-empty-create').addEventListener('click', handleCreateNew);
            
            document.getElementById('btn-edit-back').addEventListener('click', handleBackToList);
            document.getElementById('btn-cancel-edit').addEventListener('click', handleCancelEdit);
            document.getElementById('btn-save-file').addEventListener('click', handleSaveFile);
            
            document.getElementById('btn-detail-back').addEventListener('click', handleBackToList);
            document.getElementById('btn-edit-mode').addEventListener('click', handleEditMode);
            document.getElementById('btn-delete').addEventListener('click', handleDeleteFile);
            document.getElementById('btn-download').addEventListener('click', handleDownload);
            
            els.tabPreview.addEventListener('click', () => { state.viewMode = 'preview'; renderMainArea(); });
            els.tabCode.addEventListener('click', () => { state.viewMode = 'code'; renderMainArea(); });
            
            els.btnFullscreen.addEventListener('click', handleOpenInNewTab);
            
            document.getElementById('btn-duplicate').addEventListener('click', handleDuplicate);
            document.getElementById('btn-export').addEventListener('click', handleExport);
            document.getElementById('input-import').addEventListener('change', handleImport);
            
            els.editContent.addEventListener('input', handleContentInput);
            els.editContent.addEventListener('keydown', handleEditorTab);
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Khởi động
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
